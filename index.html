<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reformas Elkano · Arquitectura técnica y reformas integrales en Donostia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Inter+Tight:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-screen-label="Home">
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="images.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "bold",
  "lang": "es",
  "showFab": true,
  "accentHue": 200
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const lang = tweaks.lang || 'es';
  const t = window.i18n[lang];

  React.useEffect(() => {
    const palette = tweaks.palette === 'bold' ? 'bold' : '';
    document.documentElement.dataset.palette = palette;
    document.documentElement.style.setProperty('--accent', `oklch(${tweaks.palette === 'bold' ? '0.40 0.13' : '0.45 0.06'} ${tweaks.accentHue || 235})`);
  }, [tweaks.palette, tweaks.accentHue]);

  return (
    <>
      <Header lang={lang} setLang={(l) => setTweak('lang', l)} t={t} />
      <main>
        <Hero t={t} />
        <Marquee items={t.marquee} />
        <Philosophy t={t} />
        <Services t={t} />
        <Aerotermia t={t} />
        <Projects t={t} lang={lang} />
        <Process t={t} />
        <Testimonials t={t} />
        <Zone t={t} />
        <FAQ t={t} />
        <Contact t={t} lang={lang} />
      </main>
      <Footer t={t} />
      {tweaks.showFab && <WhatsAppFab />}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Variación visual">
          <TweakRadio
            value={tweaks.palette}
            onChange={(v) => setTweak('palette', v)}
            options={[
              { label: 'Clásica', value: 'classic' },
              { label: 'Atrevida', value: 'bold' },
            ]}
          />
        </TweakSection>
        <TweakSection label="Idioma">
          <TweakRadio
            value={lang}
            onChange={(v) => setTweak('lang', v)}
            options={[
              { label: 'Castellano', value: 'es' },
              { label: 'Euskera', value: 'eu' },
            ]}
          />
        </TweakSection>
        <TweakSection label="Tono del acento">
          <TweakSlider
            value={tweaks.accentHue || 235}
            onChange={(v) => setTweak('accentHue', v)}
            min={180}
            max={280}
            step={5}
            suffix="°"
          />
        </TweakSection>
        <TweakSection label="Botón flotante WhatsApp">
          <TweakToggle
            value={tweaks.showFab}
            onChange={(v) => setTweak('showFab', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
